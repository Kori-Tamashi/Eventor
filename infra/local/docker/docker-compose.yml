services:
  database:
    image: postgres:17
    container_name: database
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      start_period: 20s
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - eventor-network

  database-interface:
    image: dpage/pgadmin4
    container_name: database-interface
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "3001:80"
    volumes:
      - ../pgadmin/servers.json:/pgadmin4/servers.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      start_period: 15s
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      - database
    networks:
      - eventor-network

  web-server:
    image: nginx:alpine
    container_name: web-server
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${FRONTEND_PATH}/typescript/dist:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      start_period: 15s
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - eventor-network

  backend:
    image:
      build:
        dockerfile: dockerfile.backend
      container_name: backend
      environment:
        DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?schema=public
      ports:
        - "8080:8080"
      volumes:
        - ${BACKEND_PATH}/dotnet/:/app
      depends_on:
        - database

networks:
  eventor-network:
    driver: bridge
