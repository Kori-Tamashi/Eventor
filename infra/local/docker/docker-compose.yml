services:
  database:
    image: postgres:17
    container_name: database
    environment:
      POSTGRES_DB: eventor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventor"]
      start_period: 20s
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - eventor-network

networks:
  eventor-network:
    driver: bridge
