services:
  database:
    build:
      context: ../../../
      dockerfile: ${DOCKER_PATH}/dockerfile.database
    container_name: database
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      start_period: 15s
      interval: 3s
      timeout: 3s
      retries: 3
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - eventor-network

  frontend:
    build:
      context: ../../../
      dockerfile: ${DOCKER_PATH}/dockerfile.frontend
    container_name: frontend
    networks:
      - eventor-network

  backend:
    build:
      context: ../../../
      dockerfile: ${DOCKER_PATH}/dockerfile.backend
    container_name: backend
    ports:
      - "8080:8080"
    networks:
      - eventor-network

  web-server:
    build:
      context: ../../../
      dockerfile: ${DOCKER_PATH}/dockerfile.webserver
    container_name: web-server
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      start_period: 15s
      interval: 3s
      timeout: 3s
      retries: 3
    networks:
      - eventor-network

networks:
  eventor-network:
    driver: bridge