name: Auto Code Review
env:
  DOCKER_COMPOSE_PATH: infra/auto-review/docker/docker-compose.yml
  WEBHOOK_URL: http://localhost:5678/webhook/code-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker
        uses: docker/setup-docker-action@v4
        with:
          version: '29.2.1'

      - name: Verify Docker installation
        run: docker --version

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin develop
          DIFF=$(git diff origin/develop...HEAD)
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "diff<<$EOF" >> $GITHUB_ENV
          echo "$DIFF" >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV

      - name: Start n8n container
        run: |
          docker compose -f ${{ env.DOCKER_COMPOSE_PATH }} up -d n8n --wait

      - name: Check n8n container status
        run: |
          status=$(docker inspect -f '{{.State.Status}}' n8n)
          if [ "$status" != "running" ]; then
            echo "Container is not running (status: $status)"
            exit 1
          fi

      - name: Create DeepSeek credential via n8n API
        run: |
          curl -X POST http://localhost:5678/api/v1/credentials \
            -H "Content-Type: application/json" \
            -d '{
              "name": "DeepSeek account",
              "type": "deepSeekApi",
              "data": {
                "apiKey": "${{ secrets.DEEPSEEK_API_KEY }}"
              }
            }'

      - name: Import workflow to n8n container
        run: |
          WORKFLOW_ID=$(docker exec n8n n8n import:workflow --input=/home/node/.n8n/workflow.json --output=id-only)
          docker exec n8n n8n update:workflow $WORKFLOW_ID --active=true

      - name: Trigger n8n container webhook
        env:
          PR_DIFF: ${{ env.diff }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DIFF_ESCAPED=$(echo "$PR_DIFF" | jq -Rs .)
          curl -X POST ${{ env.WEBHOOK_URL }} \
            -H "Content-Type: application/json" \
            -d "{
              \"diff\": $DIFF_ESCAPED,
              \"prNumber\": $PR_NUMBER,
              \"repository\": \"$PR_REPO\",
              \"token\": \"$GITHUB_TOKEN\"
            }"
