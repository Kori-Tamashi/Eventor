<aside class="sidebar ui-sidebar-surface">
  <div class="brand">Eventor</div>

  <nav class="nav">
    <a
      class="nav-item"
      routerLink="/app/dashboard"
      routerLinkActive="active"
      aria-label="Dashboard"
    >
      <i class="pi pi-home"></i>
    </a>

    <a
      class="nav-item"
      routerLink="/app/events"
      routerLinkActive="active"
      aria-label="Events"
    >
      <i class="pi pi-calendar"></i>
    </a>

    <a
      class="nav-item"
      routerLink="/app/organization"
      routerLinkActive="active"
      aria-label="Organization"
    >
      <i class="pi pi-list"></i>
    </a>

    <a
      class="nav-item"
      routerLink="/app/admin"
      routerLinkActive="active"
      aria-label="Admin"
    >
      <i class="pi pi-cog"></i>
    </a>
  </nav>

  <div class="bottom">
    <button
      type="button"
      class="nav-item"
      (click)="logoutRequested.emit()"
      aria-label="Logout"
    >
      <i class="pi pi-sign-out"></i>
    </button>

    <div class="bottom-separator" aria-hidden="true"></div>

    <button
      type="button"
      class="nav-item"
      [class.active]="profileOpen()"
      (click)="profileToggle.emit()"
      aria-label="Profile"
    >
      <i class="pi pi-user"></i>
    </button>
  </div>
</aside>
