<div class="shell">
  <app-sidebar
    [profileOpen]="profileDrawerOpen()"
    (profileToggle)="toggleProfileDrawer()"
    (logoutRequested)="logout()"
  ></app-sidebar>

  <main class="main">
    <section class="content">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>

<p-drawer
  position="right"
  [visible]="profileDrawerOpen()"
  (visibleChange)="profileDrawerOpen.set($event)"
  styleClass="event-drawer profile-drawer"
>
  <app-profile
    (closeRequested)="profileDrawerOpen.set(false)"
    (sessionEnded)="logout()"
  ></app-profile>
</p-drawer>

<app-event-details-drawer></app-event-details-drawer>
<app-event-management-drawer></app-event-management-drawer>
