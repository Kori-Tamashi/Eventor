<div class="auth-page">
  <div class="auth-card ui-surface">
    <h1 class="auth-title">{{ title() }}</h1>

    <form
      class="auth-form"
      autocomplete="on"
      [formGroup]="authForm"
      (submit)="onSubmit($event)"
    >
      <div class="auth-field">
        <label class="auth-label" for="username">Имя пользователя</label>
        <input
          id="username"
          pInputText
          class="ui-input"
          type="text"
          formControlName="username"
          autocomplete="username"
        />
      </div>

      @if (isRegisterMode()) {
        <div class="auth-field">
          <label class="auth-label" for="phone">Номер телефона</label>
          <input
            id="phone"
            pInputText
            class="ui-input"
            type="text"
            formControlName="phone"
            autocomplete="tel"
          />
        </div>
      }

      <div class="auth-field">
        <div class="auth-label-row">
          <label class="auth-label" for="password">Пароль</label>

          @if (!isRegisterMode()) {
            <a
              class="auth-link"
              href="#"
              aria-label="Forgot password"
              (click)="$event.preventDefault()"
            >
              Забыли пароль?
            </a>
          }
        </div>

        <p-password
          inputId="password"
          formControlName="password"
          [autocomplete]="passwordAutocomplete()"
          [toggleMask]="true"
          [feedback]="false"
          inputStyleClass="ui-input"
          styleClass="auth-password"
        ></p-password>
      </div>

      @if (isRegisterMode()) {
        <div class="auth-field">
          <label class="auth-label" for="confirmPassword">Подтвердите пароль</label>

          <p-password
            inputId="confirmPassword"
            formControlName="confirmPassword"
            autocomplete="new-password"
            [toggleMask]="true"
            [feedback]="false"
            inputStyleClass="ui-input"
            styleClass="auth-password"
          ></p-password>
        </div>
      }

      <button
        pButton
        type="submit"
        class="ui-primary-btn auth-submit"
        [attr.aria-label]="submitLabel()"
      >
        <span pButtonLabel>{{ submitLabel() }}</span>
      </button>
    </form>

    <div class="auth-divider" aria-hidden="true">
      <span class="auth-divider-line"></span>
      <span class="auth-divider-text">или</span>
      <span class="auth-divider-line"></span>
    </div>

    <div class="auth-footer">
      <span class="auth-muted">{{ footerText() }}</span>
      <a class="auth-link" routerLink="/auth" [queryParams]="footerQueryParams()">
        {{ footerActionText() }}
      </a>
    </div>
  </div>
</div>
