<div class="auth-page">
  <div class="auth-card ui-surface">
    <h1 class="auth-title">{{ title() }}</h1>

    <form
      class="auth-form"
      autocomplete="on"
      [formGroup]="authForm"
      (submit)="onSubmit($event)"
    >
      @if (isRegisterMode()) {
        <div class="auth-field">
          <label class="auth-label" for="name">Имя пользователя</label>
          <input
            id="name"
            pInputText
            class="ui-input"
            type="text"
            formControlName="name"
            autocomplete="username"
          />
        </div>
      }

      <div class="auth-field">
        <label class="auth-label" for="phone">Номер телефона</label>
        <input
          id="phone"
          pInputText
          class="ui-input"
          type="text"
          formControlName="phone"
          autocomplete="tel"
        />
      </div>

      @if (isRegisterMode()) {
        <div class="auth-field">
          <label class="auth-label" for="gender">Пол</label>

          <div class="ui-select-wrap">
            <select
              id="gender"
              class="ui-select"
              formControlName="gender"
            >
              @for (option of genderOptions; track option.value) {
                <option [ngValue]="option.value">{{ option.label }}</option>
              }
            </select>
            <i class="pi pi-angle-down ui-select-icon" aria-hidden="true"></i>
          </div>
        </div>
      }

      <div class="auth-field">
        <div class="auth-label-row">
          <label class="auth-label" for="password">Пароль</label>

          @if (!isRegisterMode()) {
            <a
              class="auth-link"
              href="#"
              aria-label="Forgot password"
              (click)="$event.preventDefault()"
            >
              Забыли пароль?
            </a>
          }
        </div>

        <p-password
          inputId="password"
          formControlName="password"
          [autocomplete]="passwordAutocomplete()"
          [toggleMask]="true"
          [feedback]="false"
          inputStyleClass="ui-input"
          styleClass="auth-password"
        ></p-password>
      </div>

      @if (isRegisterMode()) {
        <div class="auth-field">
          <label class="auth-label" for="confirmPassword">Подтвердите пароль</label>

          <p-password
            inputId="confirmPassword"
            formControlName="confirmPassword"
            autocomplete="new-password"
            [toggleMask]="true"
            [feedback]="false"
            inputStyleClass="ui-input"
            styleClass="auth-password"
          ></p-password>
        </div>
      }

      @if (errorMessage()) {
        <div class="ui-feedback-message ui-feedback-message--error" role="alert">
          {{ errorMessage() }}
        </div>
      }

      <button
        pButton
        type="submit"
        class="ui-primary-btn auth-submit"
        [attr.aria-label]="submitLabel()"
        [disabled]="submitDisabled()"
      >
        <span pButtonLabel>{{ isSubmitting() ? 'Подождите...' : submitLabel() }}</span>
      </button>
    </form>

    <div class="auth-divider" aria-hidden="true">
      <span class="auth-divider-line"></span>
      <span class="auth-divider-text">или</span>
      <span class="auth-divider-line"></span>
    </div>

    <div class="auth-footer">
      <span class="auth-muted">{{ footerText() }}</span>
      <a class="auth-link" routerLink="/auth" [queryParams]="footerQueryParams()">
        {{ footerActionText() }}
      </a>
    </div>
  </div>
</div>
