<div class="page">
  <div class="ui-surface page-card">
    <header class="header">
      <div class="title-block">
        <h1 class="title">Организованные мероприятия</h1>
        <p class="subtitle">Список мероприятий, организованных вами</p>
      </div>

      <div class="actions">
        <span class="search ui-search p-input-icon-left">
          <i class="pi pi-search"></i>
          <input pInputText type="text" placeholder="Поиск" />
        </span>

        <div class="pager">
          <button pButton type="button" class="ui-icon-btn" aria-label="Filter">
            <span pButtonIcon class="pi pi-filter"></span>
          </button>

          <span class="v-sep" aria-hidden="true"></span>

          <div class="page-count ui-surface">1 из 15</div>

          <button pButton type="button" class="ui-icon-btn" aria-label="Prev">
            <span pButtonIcon class="pi pi-chevron-left"></span>
          </button>

          <button pButton type="button" class="ui-icon-btn" aria-label="Next">
            <span pButtonIcon class="pi pi-chevron-right"></span>
          </button>

          <button pButton type="button" class="ui-primary-btn" aria-label="Create event">
            <span pButtonIcon class="pi pi-plus"></span>
            <span pButtonLabel>Создать мероприятие</span>
          </button>
        </div>
      </div>
    </header>
  </div>
</div>
