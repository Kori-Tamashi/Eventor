<div class="reviews-content">
  <app-drawer-card title="Добавить отзыв">
    <div class="review-form">
      <div class="review-field">
        <div class="review-label-row">
          <label class="review-label" for="reviewText">Комментарий</label>
          <span class="review-counter">{{ reviewCountLabel() }}</span>
        </div>

        <textarea
          id="reviewText"
          pTextarea
          class="ui-input review-textarea"
          rows="5"
          [value]="reviewText()"
          (input)="onReviewInput(($any($event.target)).value)"
        ></textarea>
      </div>

      <div class="review-field">
        <label class="review-label">Оценка</label>

        <p-rating
          class="review-rating"
          [ngModel]="reviewRating()"
          (ngModelChange)="onReviewRatingChange($event)"
          [stars]="5"
        ></p-rating>
      </div>

      <div class="review-actions">
        <button
          pButton
          type="button"
          class="review-secondary-btn"
          aria-label="Cancel review"
          (click)="cancelReview()"
        >
          <span pButtonLabel>Отменить</span>
        </button>

        <button
          pButton
          type="button"
          class="ui-primary-btn"
          aria-label="Save review"
          [disabled]="!canSaveReview()"
          (click)="saveReview()"
        >
          <span pButtonLabel>Добавить отзыв</span>
        </button>
      </div>
    </div>
  </app-drawer-card>

  <app-drawer-card title="Список отзывов">
    <div class="review-list">
      @for (review of reviewRows(); track $index) {
        <article class="review-item">
          <div class="review-item__head">
            <div class="review-item__person">{{ review.person }}</div>

            <div class="review-item__head-actions">
              <p-rating
                class="review-rating review-rating--readonly"
                [ngModel]="review.rating"
                [readonly]="true"
                [stars]="5"
              ></p-rating>

              @if (review.isOwnedByCurrentUser) {
                <button
                  pButton
                  type="button"
                  class="ui-icon-btn review-delete-btn"
                  aria-label="Delete review"
                  [disabled]="deletingFeedbackId() === review.feedbackId"
                  (click)="deleteReview(review.feedbackId)"
                >
                  <span
                    pButtonIcon
                    class="pi"
                    [class.pi-trash]="deletingFeedbackId() !== review.feedbackId"
                    [class.pi-spin]="deletingFeedbackId() === review.feedbackId"
                    [class.pi-spinner]="deletingFeedbackId() === review.feedbackId"
                  ></span>
                </button>
              }
            </div>
          </div>

          <p class="review-item__comment">{{ review.comment }}</p>
        </article>
      } @empty {
        <div class="review-empty">Отзывов пока нет</div>
      }
    </div>
  </app-drawer-card>
</div>
