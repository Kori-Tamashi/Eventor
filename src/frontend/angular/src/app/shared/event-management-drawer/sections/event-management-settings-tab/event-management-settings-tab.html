<div class="settings-card ui-surface">
  <div class="settings-form">
    @if (errorMessage()) {
      <div class="ui-feedback-message ui-feedback-message--error">
        {{ errorMessage() }}
      </div>
    }

    <div class="settings-field">
      <div class="settings-label-row">
        <label class="settings-label" for="eventTitle">Название мероприятия</label>
        <span class="settings-counter">{{ titleCountLabel() }}</span>
      </div>

      <input
        id="eventTitle"
        pInputText
        class="ui-input"
        type="text"
        [value]="eventTitle()"
        (input)="onTitleInput(($any($event.target)).value)"
      />
    </div>

    <div class="settings-field">
      <div class="settings-label-row">
        <label class="settings-label" for="description">Описание</label>
        <span class="settings-counter">{{ descriptionCountLabel() }}</span>
      </div>

      <textarea
        id="description"
        pTextarea
        class="ui-input settings-textarea"
        rows="4"
        [value]="description()"
        (input)="onDescriptionInput(($any($event.target)).value)"
      ></textarea>
    </div>

    <div class="settings-field">
      <label class="settings-label" for="location">Локация</label>
      <div class="ui-select-wrap">
        <select
          id="location"
          class="ui-input ui-select"
          [value]="locationId()"
          (change)="onLocationInput(($any($event.target)).value)"
        >
          @for (location of locations(); track location.id) {
            <option [value]="location.id">{{ location.title }}</option>
          }
        </select>
        <i class="pi pi-chevron-down ui-select-icon" aria-hidden="true"></i>
      </div>
    </div>

    <div class="settings-grid">
      <div class="settings-field">
        <label class="settings-label" for="date">Дата</label>

        <div class="settings-date-input">
          <input
            id="date"
            pInputText
            class="ui-input settings-date-control"
            type="date"
            [value]="date()"
            (input)="onDateInput(($any($event.target)).value)"
          />
        </div>
      </div>

      <div class="settings-field">
        <label class="settings-label" for="daysCount">Количество дней</label>
        <input
          id="daysCount"
          pInputText
          class="ui-input"
          type="text"
          [value]="daysCountValue()"
          (input)="onDaysCountInput(($any($event.target)).value)"
        />
      </div>
    </div>

    <div class="settings-grid">
      <div class="settings-field">
        <label class="settings-label" for="markup">Наценка</label>
        <input
          id="markup"
          pInputText
          class="ui-input"
          type="text"
          [value]="markup()"
          (input)="onMarkupInput(($any($event.target)).value)"
        />
      </div>
    </div>

    <div class="settings-actions">
      <button
        pButton
        type="button"
        class="settings-secondary-btn"
        aria-label="Cancel"
        (click)="cancel()"
      >
        <span pButtonLabel>Отменить</span>
      </button>

      <button
        pButton
        type="button"
        class="ui-primary-btn"
        aria-label="Save"
        [disabled]="isSaving()"
        (click)="save()"
      >
        <span pButtonLabel>{{ isSaving() ? 'Сохранение...' : 'Сохранить' }}</span>
      </button>
    </div>
</div>
