<p-tabs [value]="activeTab()" (valueChange)="onTabValueChange($event)">
  <p-tablist>
    <p-tab value="settings">Настройки</p-tab>
    <p-tab value="participants">Участники</p-tab>
    <p-tab value="menu">Меню</p-tab>
    <p-tab value="analytics">Анализ</p-tab>
  </p-tablist>

  <p-tabpanels>
    <p-tabpanel value="settings">
      <app-event-management-day-settings-tab
        [initialTitle]="dayTitle()"
        [initialDescription]="dayDescription()"
        [isSaving]="isSaving()"
        [errorMessage]="errorMessage()"
        [successMessage]="successMessage()"
        (saveRequested)="onSaveDay($event)"
        (cancelRequested)="onCancelDay()"
      ></app-event-management-day-settings-tab>
    </p-tabpanel>

    <p-tabpanel value="participants">
      <app-event-management-day-participants-tab
        [participantRows]="participantRows()"
        [isSaving]="isSavingParticipants()"
        (saveRequested)="onSaveParticipants($event)"
        (cancelRequested)="onCancelParticipants()"
      ></app-event-management-day-participants-tab>
    </p-tabpanel>

    <p-tabpanel value="menu">
      <app-event-management-day-menu-tab
        [initialMenuItems]="menuItems()"
        [availableItems]="availableItems()"
        [isLoading]="isLoadingMenuItems()"
        [isSaving]="isSavingMenuItems()"
        (saveRequested)="onSaveMenuItems($event)"
        (cancelRequested)="onCancelMenuItems()"
      ></app-event-management-day-menu-tab>
    </p-tabpanel>

    <p-tabpanel value="analytics">
      <app-event-management-day-analytics-tab
        [dayCost]="dayAnalytics()?.dayCost ?? null"
        [dayPrice]="dayAnalytics()?.dayPrice ?? null"
        [dayPriceWithPrivileges]="dayAnalytics()?.dayPriceWithPrivileges ?? null"
        [participantsCount]="participantsCount()"
      ></app-event-management-day-analytics-tab>
    </p-tabpanel>
  </p-tabpanels>
</p-tabs>
