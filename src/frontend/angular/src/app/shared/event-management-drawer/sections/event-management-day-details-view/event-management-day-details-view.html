<p-tabs [value]="activeTab()" (valueChange)="onTabValueChange($event)">
  <p-tablist>
    <p-tab value="settings">Настройки</p-tab>
    <p-tab value="participants">Участники</p-tab>
    <p-tab value="menu">Меню</p-tab>
    <p-tab value="analytics">Анализ</p-tab>
  </p-tablist>

  <p-tabpanels>
    <p-tabpanel value="settings">
      <app-event-management-day-settings-tab
        [initialTitle]="dayTitle()"
      ></app-event-management-day-settings-tab>
    </p-tabpanel>

    <p-tabpanel value="participants">
      <app-event-management-day-participants-tab></app-event-management-day-participants-tab>
    </p-tabpanel>

    <p-tabpanel value="menu">
      <div class="drawer-placeholder-card ui-surface">
        <div class="drawer-placeholder-title">Меню</div>
        <div class="drawer-placeholder-text">
          placeholder
        </div>
      </div>
    </p-tabpanel>

    <p-tabpanel value="analytics">
      <div class="drawer-placeholder-card ui-surface">
        <div class="drawer-placeholder-title">Анализ</div>
        <div class="drawer-placeholder-text">
          placeholder
        </div>
      </div>
    </p-tabpanel>
  </p-tabpanels>
</p-tabs>
